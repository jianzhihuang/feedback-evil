name: Auto Publish to PyPI

on:
  push:
    branches: [main]

jobs:
  publish:
    # Skip if commit was made by this workflow itself (avoid infinite loop)
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Bump version
        id: bump
        run: |
          CURRENT=$(grep '^version = ' pyproject.toml | sed 's/version = "\(.*\)"/\1/')
          echo "Current version: $CURRENT"

          MAJOR=$(echo $CURRENT | cut -d. -f1)
          MINOR=$(echo $CURRENT | cut -d. -f2)
          PATCH=$(echo $CURRENT | cut -d. -f3)

          if [ "$PATCH" -ge 9 ]; then
            MINOR=$((MINOR + 1))
            PATCH=0
          else
            PATCH=$((PATCH + 1))
          fi

          NEW_VERSION="$MAJOR.$MINOR.$PATCH"
          echo "New version: $NEW_VERSION"
          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT

          sed -i "s/^version = \"$CURRENT\"/version = \"$NEW_VERSION\"/" pyproject.toml

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pyproject.toml
          git commit -m "chore: bump version to ${{ steps.bump.outputs.new_version }} [skip ci]"
          git push

      - name: Build package
        run: |
          pip install build
          python -m build

      - name: Publish to PyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_TOKEN }}
        run: |
          pip install twine
          twine upload dist/*

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          NEW_VERSION="${{ steps.bump.outputs.new_version }}"
          TAG="v${NEW_VERSION}"
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -n "$LAST_TAG" ]; then
            NOTES=$(git log "${LAST_TAG}..HEAD" --pretty=format:"- %s" --no-merges | grep -v "\[skip ci\]" | grep -v "^- chore: bump version" || true)
          else
            NOTES=$(git log --pretty=format:"- %s" --no-merges -20 | grep -v "\[skip ci\]" | grep -v "^- chore: bump version" || true)
          fi
          [ -z "$NOTES" ] && NOTES="- Version bump to ${NEW_VERSION}"
          {
            echo "## feedback-evil ${TAG}"
            echo ""
            echo "📦 [PyPI](https://pypi.org/project/feedback-evil/${NEW_VERSION}/)"
            echo ""
            echo "### 使用方式"
            echo '```json'
            echo '{"command": "uvx", "args": ["feedback-evil@latest"]}'
            echo '```'
            echo ""
            echo "### 變更內容"
            echo "${NOTES}"
          } > /tmp/release-notes.md
          git tag "$TAG"
          git push origin "$TAG"
          gh release create "$TAG" dist/* \
            --title "feedback-evil ${TAG}" \
            --notes-file /tmp/release-notes.md
